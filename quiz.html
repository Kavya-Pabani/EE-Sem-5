<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Engine</title>
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --primary: #2563eb; --text: #1e293b; --border: #e2e8f0; --success: #22c55e; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 40px 20px; margin: 0; }
        .quiz-box { max-width: 640px; margin: 0 auto; background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 32px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        h2 { margin: 0 0 24px 0; color: #0f172a; font-size: 1.5rem; border-bottom: 2px solid var(--bg); padding-bottom: 16px; }
        .progress { color: #64748b; font-weight: 600; font-size: 0.9rem; margin-bottom: 8px; }
        .question { font-size: 1.2rem; font-weight: 600; margin-bottom: 24px; line-height: 1.5; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .btn { padding: 16px; border: 1px solid var(--border); border-radius: 10px; background: var(--card); text-align: left; font-size: 1rem; cursor: pointer; font-weight: 500; transition: all 0.2s; }
        .btn:hover { background: #f8fafc; border-color: #cbd5e1; transform: translateY(-1px); }
        .score-layout { text-align: center; padding: 20px 0; }
        .score-circle { width: 120px; height: 120px; background: #f0fdf4; border: 4px solid var(--success); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px auto; font-size: 2rem; font-weight: 800; color: var(--success); }
        .home-btn { display: inline-block; background: var(--primary); color: white; padding: 12px 24px; border-radius: 8px; text-decoration: none; font-weight: 600; margin-top: 16px; transition: opacity 0.2s; }
        .home-btn:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="quiz-box">
        <h2 id="title">Loading Quiz...</h2>
        <div id="game-frame">
            <div class="progress">Question <span id="qn">1</span> of <span id="qtotal">1</span></div>
            <div class="question" id="qtext">Question Text</div>
            <div class="options" id="obox"></div>
        </div>
        <div id="score-frame" class="score-layout" style="display: none;">
            <div class="score-circle" id="final-score">0/0</div>
            <h3>Quiz Completed Successfully!</h3>
            <p id="feedback" style="color:#64748b; margin-bottom: 24px;">Great effort practicing your engineering concepts.</p>
            <a class="home-btn" href="index.html">Return to Dashboard</a>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        const p = new URLSearchParams(window.location.search);
        const data = quizDatabase[p.get('sub')]?.chapters[p.get('ch')]?.topics[p.get('top')];
        
        if (!data || data.questions.length === 0) {
            document.getElementById('title').innerText = "Empty Quiz Topic";
            document.getElementById('game-frame').innerHTML = "<p>No questions have been dropped into this topic file yet.</p><a class='home-btn' href='index.html'>Go Back</a>";
        } else {
            document.getElementById('title').innerText = data.topicName;
            initQuiz(data.questions);
        }

        function initQuiz(questions) {
            let idx = 0, score = 0;
            const total = questions.length;
            document.getElementById('qtotal').innerText = total;

            function render() {
                if(idx >= total) {
                    document.getElementById('game-frame').style.display = 'none';
                    document.getElementById('score-frame').style.display = 'block';
                    document.getElementById('final-score').innerText = `${score}/${total}`;
                    return;
                }
                document.getElementById('qn').innerText = idx + 1;
                document.getElementById('qtext').innerText = questions[idx].q;
                const obox = document.getElementById('obox');
                obox.innerHTML = '';
                
                questions[idx].options.forEach((opt, oIdx) => {
                    const b = document.createElement('button');
                    b.className = 'btn';
                    b.innerText = opt;
                    b.onclick = () => {
                        if(oIdx === questions[idx].answer) score++;
                        idx++;
                        render();
                    };
                    obox.appendChild(b);
                });
            }
            render();
        }
    </script>
</body>
</html>
